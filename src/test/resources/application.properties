# H2 In-Memory Database Configuration for Tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS maindb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate Properties
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.default_schema=

# Disable Flyway for tests to rely on Hibernate schema creation
spring.flyway.enabled=false

# Auto-seed workflow definitions in database for testing
app.workflow.auto-seed-db=true

# Root Logging level
logging.level.root=ERROR
logging.level.com.orchestrationengine=DEBUG

# Service Request Logging Configuration
service.request.record=true
service.request.workflows=USER_REGISTRATION,FORGOT_PASSWORD
