# H2 In-Memory Database Configuration for Tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS maindb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate Properties
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.default_schema=

# Flyway - enabled (uniform with production, migrations are H2-compatible)
spring.flyway.enabled=true
spring.flyway.schemas=maindb
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=0

# Auto-seed workflow definitions in database for testing
app.workflow.auto-seed-db=true

# Root Logging level
logging.level.root=ERROR
logging.level.com.orchestrationengine=DEBUG

# Service Request Logging Configuration
service.request.record=true
service.request.workflows=USER_REGISTRATION,FORGOT_PASSWORD
